name: tmux-ide

team:
  name: tmux-ide

rows:
  - size: 70%
    panes:
      - title: Lead
        command: claude
        role: lead
        focus: true
      - title: Docs Agent
        command: claude
        role: teammate
        task: "Work on the docs site at docs/ — Next.js + Fumadocs, landing page, MDX content"
        dir: docs
      - title: CLI Agent
        command: claude
        role: teammate
        task: "Work on the CLI source code at src/ and bin/ — commands, validation, templates"

  - panes:
      - title: Docs Dev
        command: pnpm docs
      - title: Shell
