name: TmuxIde
options:
  bundleIdPrefix: dev.tmuxide
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  TmuxIde:
    type: application
    platform: macOS
    sources:
      - path: TmuxIde
        excludes:
          - "**/*.test.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.tmuxide.app
        PRODUCT_NAME: tmux-ide
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: TmuxIde/VibeTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: TmuxIde/VibeTunnel/TmuxIde.entitlements
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: "YES"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: TmuxIde/VibeTunnel/TmuxIde.entitlements

  TmuxIdeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TmuxIdeTests
    dependencies:
      - target: TmuxIde
