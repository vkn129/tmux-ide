name: Bug report
description: Report a bug or regression in tmux-ide
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tmux-ide version
      placeholder: 1.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, zsh, tmux 3.4, Node 20
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include commands, config, and output where possible.
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
